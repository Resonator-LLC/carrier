name: Build libjami artifacts

# Builds libjami at the SHA pinned in JAMI_VERSION on every supported triple,
# tars the resulting cache prefix, and uploads each tarball as an asset on a
# release tagged `libjami-<sha>`. Once published, `make libjami` (and
# `make libjami-fetch`) downloads + verifies these tarballs instead of
# building from source on every dev machine.
#
# Triggered automatically when a commit on main changes JAMI_VERSION, and
# manually via workflow_dispatch (e.g. for re-runs or tag overrides).
#
# Cold builds take 1-3 hours per runner. Re-running with the same SHA is
# a no-op via the build script's idempotency.

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: "Release tag (default: libjami-<sha>)"
        required: false
        default: ""
  # Auto-publish when the pinned SHA changes on main. JAMI_VERSION is the
  # single source of truth for which libjami the project consumes, so any
  # commit that bumps it should produce a fresh artefact set.
  push:
    branches:
      - main
    paths:
      - JAMI_VERSION

permissions:
  contents: write  # required for softprops/action-gh-release

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.read-pin.outputs.sha }}
      tag: ${{ steps.read-pin.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Read JAMI_VERSION
        id: read-pin
        run: |
          sha=$(tr -d '[:space:]' < JAMI_VERSION)
          test -n "$sha" || { echo "JAMI_VERSION is empty" >&2; exit 1; }
          tag="${{ inputs.release-tag }}"
          [ -z "$tag" ] && tag="libjami-$sha"
          echo "sha=$sha"  >> "$GITHUB_OUTPUT"
          echo "tag=$tag"  >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    timeout-minutes: 240  # cold contrib + daemon build can run 2-3h
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14         # arm64
            triple-prefix: arm64-apple-darwin
          - runner: macos-13         # x86_64
            triple-prefix: x86_64-apple-darwin
          - runner: ubuntu-22.04
            triple-prefix: x86_64-linux-gnu
          - runner: ubuntu-24.04
            triple-prefix: x86_64-linux-gnu
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install host build tools (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install automake libtool nasm yasm ninja cmake pkg-config

      - name: Install host build tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            autoconf automake libtool nasm yasm ninja-build cmake pkg-config \
            build-essential git curl python3 \
            libpipewire-0.3-dev libpulse-dev libasound2-dev libv4l-dev \
            libudev-dev libva-dev libvdpau-dev

      # We don't cache the full libjami-src tree: when a build fails partway,
      # actions/cache's post-step still saves the partial state, and the next
      # run inherits a poisoned tree (e.g. ffmpeg's configure runs before opus
      # was rebuilt). Only the upstream tarballs are cached, since they're
      # content-addressed and can't be poisoned.
      #
      # The path matches build-libjami.sh's --cache-dir: a SHA-independent
      # location so SHA bumps reuse already-downloaded archives. Cache key
      # restores from any earlier run on the same OS.
      - name: Cache contrib tarballs
        uses: actions/cache@v4
        with:
          path: ~/.cache/resonator/libjami-tarballs
          key: libjami-tarballs-${{ runner.os }}-${{ needs.prepare.outputs.sha }}
          restore-keys: |
            libjami-tarballs-${{ runner.os }}-

      - name: Build libjami
        run: |
          ./tools/build-libjami.sh

      - name: Determine artifact name
        id: artifact
        run: |
          PREFIX=$(./tools/build-libjami.sh --print-prefix)
          # Use the artifact_triple (kernel-stripped on macOS) so a single
          # tarball serves consumers across macOS kernel versions.
          TRIPLE=$(awk -F= '/^artifact_triple=/{print $2}' "$PREFIX/MANIFEST")
          NAME="libjami-${{ needs.prepare.outputs.sha }}-${TRIPLE}.tar.zst"
          echo "prefix=$PREFIX"  >> "$GITHUB_OUTPUT"
          echo "triple=$TRIPLE"  >> "$GITHUB_OUTPUT"
          echo "name=$NAME"      >> "$GITHUB_OUTPUT"

      - name: Pack tarball
        run: |
          cd "$(dirname '${{ steps.artifact.outputs.prefix }}')"
          tar --use-compress-program='zstd -19 -T0' \
              -cf "$RUNNER_TEMP/${{ steps.artifact.outputs.name }}" \
              "$(basename '${{ steps.artifact.outputs.prefix }}')"
          (cd "$RUNNER_TEMP" && shasum -a 256 "${{ steps.artifact.outputs.name }}" \
              > "${{ steps.artifact.outputs.name }}.sha256")
          ls -la "$RUNNER_TEMP/${{ steps.artifact.outputs.name }}"*

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          body: |
            libjami pre-built static prefix for SHA `${{ needs.prepare.outputs.sha }}`.
            Consumed by `make libjami` / `make libjami-fetch` (see arch/jami-migration.md D21).
          files: |
            ${{ runner.temp }}/${{ steps.artifact.outputs.name }}
            ${{ runner.temp }}/${{ steps.artifact.outputs.name }}.sha256
